<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Danger Warning</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #120000;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    text-align: center;
    padding: 35px;
    border: 2px solid red;
    border-radius: 14px;
    background: rgba(255, 0, 0, 0.08);
    box-shadow: 0 0 30px red;
    max-width: 520px;
}

h1 {
    color: red;
    font-size: 34px;
    margin-bottom: 10px;
    text-shadow: 0 0 12px red;
}

p {
    font-size: 18px;
    margin-bottom: 25px;
    line-height: 1.5;
}

button {
    margin: 8px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
}

.back {
    background: #555;
    color: white;
}

.proceed {
    background: red;
    color: white;
}

.back:hover {
    background: #777;
}

.proceed:hover {
    background: darkred;
}
</style>
</head>

<body>

<div class="box">
    <h1>⚠ DANGER DETECTED</h1>
    <p>
        This website has been flagged as <b>potentially dangerous</b>.<br>
        It may try to steal your passwords or personal data.<br><br>
        <b>Please go back immediately.</b>
    </p>

    
</div>



</body>
</html>
